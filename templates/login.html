{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <link rel="stylesheet" href="{% static 'css/prenament.css' %}">
  <title>Login - PRENAMENT</title>
</head>
<body>
<div class="login-shell">
  <div class="login-center">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-outer"></div>
      <div class="logo-mid"></div>
      <div class="logo-inner">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <path d="M9 9h.01M15 9h.01"/>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <div>
      <div class="logo-title">
        <span class="blue">PRENA</span><span class="dark">MENT</span>
      </div>
      <div class="logo-sub">Sahabat Kesehatan Mental Ibu Hamil di Era Digital.</div>
    </div>

    <!-- Login form -->
    <div style="width:100%; margin-top:12px;">
      {% if error %}
        <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="post" style="display:flex; flex-direction:column; gap:12px;">
        {% csrf_token %}
        <div class="form-field">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username" placeholder="Masukkan username" required autofocus>
        </div>
        <div class="form-field">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:4px;">Masuk</button>
      </form>

      <div style="margin-top:20px; background:var(--bg-soft); border-radius:12px; padding:14px; border:1px solid var(--border-soft);">
        <div style="font-size:12px; font-weight:600; color:var(--ink); margin-bottom:8px;">Akun Uji Coba:</div>
        <div style="font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:4px;">
          <div><span style="color:var(--ink); font-weight:600;">Ibu Hamil:</span> citra / pass123</div>
          <div><span style="color:var(--ink); font-weight:600;">Kader:</span> anisa / pass123</div>
          <div><span style="color:var(--ink); font-weight:600;">Petugas:</span> sari / pass123</div>
        </div>
      </div>
    </div>
  </div>

  <div class="login-footer">© 2026 PRENAMENT. All rights reserved.</div>
</div>
</body>
</html>
